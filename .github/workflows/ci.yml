name: ci

on: push

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Start Prisma Dev DB
        run: |
          DATABASE_URL=postgres://placeholder pnpm dlx prisma dev --detach
          URL=$(DATABASE_URL=postgres://placeholder pnpm dlx prisma dev ls 2>&1 | cat -v | grep -oE '\^\[\]8;;prisma\+postgres://[^^]+' | head -1 | sed 's/\^\[\]8;//')
          echo "DATABASE_URL=$URL" >> $GITHUB_ENV

      - name: Lint
        run: pnpm run lint

      - name: Generate Prisma Client
        run: pnpm exec prisma generate

      - name: Typecheck
        run: pnpm run typecheck
